<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukses - SPOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A81E2A;
            --primary-hover: #8C1822;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #E0E0E0;
            --radius: 8px;
            --success: #2e7d32;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        .success-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--success);
        }

        .icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 1rem;
        }

        h1 {
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .details {
            background-color: var(--bg);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 2rem;
            text-align: left;
        }
        
        .details strong {
            display: inline-block;
            width: 120px;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius);
            font-weight: 600;
            transition: background-color 0.3s;
            margin: 0.5rem;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        
        .btn-outline:hover {
            background-color: rgba(168, 30, 42, 0.05);
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon">✓</div>
    <h1>Data Berhasil Disimpan</h1>
    <p>Data Surat Pemberitahuan Objek Pajak telah tersimpan di sistem.</p>
    
    <div class="details">
        <div><strong>NOP:</strong> {{ data.nop }}</div>
        <div><strong>Nama WP:</strong> {{ data.nama_wp }}</div>
    </div>

    <div>
        <a href="/cetak/{{ data.id }}" class="btn" target="_blank">
            🖨️ Cetak Formulir (Print)
        </a>
        <a href="/" class="btn btn-outline">
            + Input Baru
        </a>
    </div>
    
    <div style="margin-top: 2rem;">
        <a href="/admin/export" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: underline;">Export Semua Data (Excel)</a>
    </div>
</div>

</body>
</html>
