<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - SPOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A81E2A;
            --primary-hover: #8C1822;
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --text: #2F3437;
            --muted: #6C757D;
            --border: #E1E5E8;
            --radius: 8px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, Arial, sans-serif;
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 5px solid var(--primary);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 10px 30px rgba(31, 35, 38, .08);
        }
        h1 { margin: 0 0 8px; color: var(--primary); font-size: 26px; }
        p { margin: 0 0 24px; color: var(--muted); }
        label { display: block; margin: 16px 0 8px; font-weight: 600; }
        input {
            width: 100%;
            height: 46px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0 12px;
            font: inherit;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(168, 30, 42, .12);
        }
        .alert {
            padding: 12px;
            border-radius: var(--radius);
            background: #FCECEE;
            color: #8C1822;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            height: 48px;
            margin-top: 22px;
            border: 0;
            border-radius: var(--radius);
            background: var(--primary);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .btn:hover { background: var(--primary-hover); }
        .back {
            display: inline-block;
            margin-top: 18px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Login Admin</h1>
        <p>Akses dashboard data SPOP dan ekspor.</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button class="btn" type="submit">Masuk Dashboard</button>
        </form>
        <a class="back" href="/">Kembali ke portal</a>
    </main>
</body>
</html>
